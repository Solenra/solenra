<div class="card">
  <h4 class="card-header">Login</h4>
  <div class="card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div>
        <mat-form-field>
          <mat-label>Username</mat-label>
          <input type="username" matInput [formControl]="form.controls['username'] | formControl">
          @if (form.controls['username'].hasError('required')) {
            <mat-error>Username is <strong>required</strong></mat-error>
          }
        </mat-form-field>
      </div>

      <div>
        <mat-form-field>
          <mat-label>Password</mat-label>
          <input type="password" matInput [formControl]="form.controls['password'] | formControl">
          @if (form.controls['password'].hasError('required')) {
            <mat-error>Password is <strong>required</strong></mat-error>
          }
        </mat-form-field>
      </div>

      <div class="action-buttons">
        <a routerLink="../register" class="btn btn-link">Register</a>
        <button type="submit" mat-stroked-button [disabled]="loading">
          <span>Login</span> @if (loading) {
          <mat-spinner [diameter]="20"></mat-spinner>
        }
      </button>
    </div>

    <!-- todo password reset link -->

  </form>
</div>
</div>
