<app-page-header 
  [title]="'Energy Plans'" 
  [buttonLabel]="'Add Energy Plan'" 
  [onAddClick]="openDialog.bind(this)"
  [showImport]="true" [showExport]="true"
  [onImportClick]="triggerImport.bind(this)"
  [onExportClick]="exportCsv.bind(this)">
  <input #fileInput type="file" accept="text/csv" style="display:none" (change)="onImportFile($event)">
  <div class="data-table-container mat-elevation-z8">
    <div class="data-table-table-container">
      <table mat-table [dataSource]="dataSource" class="data-table-table" matSort>

        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let element">{{element.name}}</td>
        </ng-container>

        <!-- Notes Column -->
        <ng-container matColumnDef="notes">
          <th mat-header-cell *matHeaderCellDef>Notes</th>
          <td mat-cell *matCellDef="let element">{{element.notes}}</td>
        </ng-container>

        <!-- Supply Rate Column -->
        <ng-container matColumnDef="supplyRateValue">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Supply Rate</th>
          <td mat-cell *matCellDef="let element">{{element.supplyRateValue}}</td>
        </ng-container>

        <!-- Export Rate Column -->
        <ng-container matColumnDef="exportRateValue">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Export Rate</th>
          <td mat-cell *matCellDef="let element">{{element.exportRateValue}}</td>
        </ng-container>

        <!-- Shared Column -->
        <ng-container matColumnDef="shared">
          <th mat-header-cell *matHeaderCellDef>Shared</th>
          <td mat-cell *matCellDef="let element">
            <mat-checkbox [checked]="element.shared" disabled></mat-checkbox>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let element">
            <button type="button" mat-icon-button (click)="openRateEditor(element.id)" matTooltip="Edit Rates">
              <mat-icon>timeline</mat-icon>
            </button>
            <button type="button" mat-icon-button (click)="edit(element)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button type="button" mat-icon-button (click)="delete(element.id)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
    <mat-paginator showFirstLastButtons [length]="resultsLength" [pageIndex]="initialPageIndex" [pageSize]="initialPageSize" [pageSizeOptions]="[5, 10, 25, 50]" aria-label="Select page"></mat-paginator>
  </div>
</app-page-header>
