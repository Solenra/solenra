<div>
    <mat-toolbar color="primary">
    <span>Solenra</span>
    <span class="spacer"></span>
        <a mat-button href="https://solenra.org/" target="_blank">Website</a>
        <a mat-button href="https://github.com/Solenra/Solenra" target="_blank">GitHub</a>
    </mat-toolbar>

    <section class="intro">
        <h1>Welcome to Solenra</h1>
        <p>Track your solar investment returns — ROI, payback period, and savings from self-consumption and export tariffs.</p>
        <button mat-raised-button color="accent" *ngIf="!isLoggedIn()" routerLink="/login">
            Register/Login to get started
        </button>
        <button mat-raised-button color="accent" *ngIf="isLoggedIn()" routerLink="/solar-systems">
            Add/view your solar system details
        </button>
    </section>

    <section class="features">
        <div class="features-container">
            @for (feature of features; track feature) {
                <mat-card class="feature-card" elevation="4">
                    <mat-card-header>
                        <mat-card-title>{{feature.title}}</mat-card-title>
                    </mat-card-header>
                    <mat-card-content>
                        <p>{{feature.description}}</p>
                    </mat-card-content>
                </mat-card>
            }
        </div>
    </section>

    <footer>
        <p>© 2026 Solenra. <a href="https://solenra.org/" target="_blank">solenra.org</a> | <a href="https://github.com/Solenra/Solenra" target="_blank">GitHub</a></p>
    </footer>
</div>
