server.servlet.context-path=/server
spring.application.name=server
#spring.jpa.properties.hibernate.jdbc.time_zone=UTC # note this causes issues with rate period lookup that splits a single record to multiple days, needs to be one day only

# flyway DB migration configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration/{vendor}

# database configuration
spring.datasource.url=jdbc:h2:file:~/.solenra/h2.db;DB_CLOSE_ON_EXIT=FALSE;LOCK_TIMEOUT=5000;TRACE_LEVEL_FILE=1;TRACE_LEVEL_SYSTEM_OUT=1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=

# quartz job scheduler configuration
spring.quartz.job-store-type=jdbc
spring.quartz.overwrite-existing-jobs=true
spring.quartz.wait-for-jobs-to-complete-on-shutdown=false
spring.quartz.properties.org.quartz.scheduler.skipUpdateCheck=true
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.jobStore.tablePrefix=QRTZ_
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.threadPool.threadCount=5
spring.quartz.properties.solaredgeApiQuartzScheduler.org.quartz.threadPool.threadCount=5
spring.quartz.properties.solaredgeV2ApiQuartzScheduler.org.quartz.threadPool.threadCount=5
app.solaredge-api-quartz-scheduler-name=solaredgeApiSchedular
app.solaredge-v2-api-quartz-scheduler-name=solaredgeV2ApiSchedular
